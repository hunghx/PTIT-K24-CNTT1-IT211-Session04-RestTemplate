spring.application.name=restful-api

# URL k?t n?i H2 (ch? ?? in-memory)
spring.datasource.url=jdbc:h2:mem:testdb

# N?u mu?n l?u file DB trên ? ??a
# spring.datasource.url=jdbc:h2:file:./data/testdb

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Cho phép truy c?p console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#debug=true
# C?u h́nh ghi log c? b?n
logging.file.name=log.txt
# C?u h́nh m?c log m?c ??nh cho toàn b? ?ng d?ng
logging.level.root=INFO
# C?u h́nh m?c log cho m?t package/class c? th?
logging.level.ra.restful.controller=INFO
logging.level.ra.restful.aspect=ERROR
logging.level.org.springframework=WARN
# Ghi log ra file
#logging.file.name=logs/application.log
# ??nh d?ng log trên console (có màu s?c)
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{39})
#%green(%msg%n)
# ??nh d?ng log khi ghi ra file (th??ng không có màu)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{39} %msg%n
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=7